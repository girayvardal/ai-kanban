version: "3.9"

services:
  kanban:
    build: .
    container_name: hralyze-kanban
    restart: unless-stopped
    ports:
      - "3737:3737"
    volumes:
      # MD dosyaları buradan okunur — HRAlyze proje klasörünü bağla
      - C:\IKSAP Projects\HRAlyze\aspnet-core\src\plugins:/data/plugins:ro
      # SQLite DB kalıcı olarak saklanır — host klasörüne bind mount
      - C:/Kanban/db:/db
      # Frontend — build almadan anlık değişiklik
      - C:/Kanban/public:/app/public:ro
    environment:
      PORT: 3737
      DB_PATH: /db/kanban.db
      PLUGINS_DIR: /data/plugins
      CRON_SCHEDULE: "0 * * * *"

  plan-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: hralyze-plan-agent
    restart: unless-stopped
    depends_on:
      - kanban
    volumes:
      # Claude CLI credentials — host'ta zaten authenticated
      - C:/Users/${USERNAME}/.claude:/root/.claude:ro
    environment:
      KANBAN_URL: http://kanban:3737

